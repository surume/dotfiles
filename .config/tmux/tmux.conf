## Global
set -g prefix C-x
set -g mode-keys vi
unbind C-b
bind C-x send-prefix
set -g base-index 1
set -g mouse on
set -g escape-time 0
set -g focus-events on
set -g renumber-windows on
set -g history-limit 50000
set -g display-time 4000
set -g detach-on-destroy off
set -g set-clipboard on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -ga terminal-overrides ",*:Smulx=\E[4::%p1%dm"
set -ga terminal-overrides ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"

## Window
setw -g pane-base-index 1
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"
bind g display-popup -d '#{pane_current_path}' -w 80% -h 80% -E 'lazygit'
bind f display-popup -d '#{pane_current_path}' -w 80% -h 80% -E
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi Y send-keys -X select-line \; send-keys -X copy-selection-and-cancel
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

## tpm plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'rickstaa/tmux-notify'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_window_current_number_color '#{@thm_peach}'

# initialize tmux plugin manager (tpm)
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# initialize tmux plugin manager
if-shell "[[ -d ~/.config/tmux/plugins/tpm ]]" '\
  run -b "~/.config/tmux/plugins/tpm/tpm" \
'

## Status bar
set -g status-left-length 100
set -g status-right-length 100
set -g status-left '#{E:@catppuccin_status_session} '
set -g status-right '#{E:@catppuccin_status_directory}'
set -ag status-right '#{E:@catppuccin_status_date_time}'
